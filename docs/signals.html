<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ML Signals — AlphaVault Quant</title>

  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="shortcut icon" href="favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="mask-icon" href="safari-pinned-tab.svg" color="#667eea">
  <link rel="icon" type="image/png" sizes="192x192" href="android-chrome-192x192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="android-chrome-512x512.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/av-global.css">
  <link rel="stylesheet" href="assets/css/av-components.css">
  <link rel="stylesheet" href="assets/css/av-charts.css">
  <link rel="stylesheet" href="assets/css/av-trading.css">

  <style>
    .signals-bottom-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 16px;
    }
    @media (max-width: 768px) {
      .signals-bottom-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="layout">

  <!-- SIDEBAR -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-text">AlphaVault Quant</div>
      <div class="sidebar-logo-sub">v5.0.9 — Multi-Agent</div>
    </div>
    <div class="nav-section">
      <div class="nav-section-label">Main</div>
      <a href="dashboard.html" class="nav-item" data-page="dashboard"><i class="fa-solid fa-gauge-high"></i> Dashboard</a>
      <a href="portfolio.html" class="nav-item" data-page="portfolio"><i class="fa-solid fa-wallet"></i> Portfolio</a>
      <a href="signals.html"   class="nav-item" data-page="signals"><i class="fa-solid fa-wave-square"></i> ML Signals</a>
    </div>
    <div class="nav-section">
      <div class="nav-section-label">Analysis</div>
      <a href="regime.html"    class="nav-item" data-page="regime"><i class="fa-solid fa-globe"></i> Regime</a>
      <a href="analytics.html" class="nav-item" data-page="analytics"><i class="fa-solid fa-chart-area"></i> Analytics</a>
      <a href="agents.html"    class="nav-item" data-page="agents"><i class="fa-solid fa-robot"></i> Agents</a>
    </div>
    <div class="nav-section">
      <div class="nav-section-label">Tools</div>
      <a href="trading.html"   class="nav-item" data-page="trading"><i class="fa-solid fa-bolt"></i> Trading</a>
      <a href="watchlist.html" class="nav-item" data-page="watchlist"><i class="fa-solid fa-eye"></i> Watchlist</a>
      <a href="settings.html"  class="nav-item" data-page="settings"><i class="fa-solid fa-gear"></i> Settings</a>
    </div>
    <div class="sidebar-status">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
        <span class="status-dot" id="ibkr-dot"></span>
        <span id="mode-label" style="font-weight:700;font-size:11px;color:#94a3b8">—</span>
      </div>
      <span id="last-sync" style="font-size:10px;color:#64748b"></span>
    </div>
  </nav>

  <!-- MAIN -->
  <main class="main">
    <header class="top-header">
      <button class="hamburger-btn" id="hamburger-btn"><i class="fa-solid fa-bars"></i></button>
      <div>
        <span class="top-header-title">ML Signals</span>
        <span class="top-header-sub" id="sig-header-sub">Loading...</span>
      </div>
      <div class="top-header-actions">
        <div id="mode-badge-header"></div>
        <button class="btn-sm" id="sig-export-btn" title="Export CSV">
          <i class="fa-solid fa-file-csv"></i> Export
        </button>
        <button class="btn-icon" id="av-theme-toggle">
          <i class="fa-solid fa-moon"></i>
        </button>
      </div>
    </header>

    <div class="page-content">

      <!-- Stats Bar -->
      <div id="signals-stats-bar" style="margin-bottom:16px">
        <div style="display:flex;gap:10px;flex-wrap:wrap">
          <div class="card skeleton" style="width:140px;height:60px"></div>
          <div class="card skeleton" style="width:120px;height:60px"></div>
          <div class="card skeleton" style="width:120px;height:60px"></div>
          <div class="card skeleton" style="width:120px;height:60px"></div>
          <div class="card skeleton" style="width:160px;height:60px"></div>
        </div>
      </div>

      <!-- Table Card -->
      <div class="av-table-wrapper">
        <!-- Filters -->
        <div class="filters-bar" style="flex-wrap:wrap;gap:8px">
          <button class="filter-btn active" data-sig-filter="ALL">All</button>
          <button class="filter-btn" data-sig-filter="BUY">
            <i class="fa-solid fa-arrow-up" style="font-size:9px;color:#10b981"></i> BUY
          </button>
          <button class="filter-btn" data-sig-filter="SELL">
            <i class="fa-solid fa-arrow-down" style="font-size:9px;color:#ef4444"></i> SELL
          </button>
          <button class="filter-btn" data-sig-filter="HIGH_CONF">
            <i class="fa-solid fa-star" style="font-size:9px;color:#eab308"></i>
            High Conf &gt;75%
          </button>

          <div style="display:flex;align-items:center;gap:8px;margin-left:4px">
            <span style="font-size:11px;color:var(--text-muted)">Min conf:</span>
            <input type="range" id="sig-conf-slider" min="0" max="100" value="0"
                   style="width:80px;accent-color:var(--accent-blue)">
            <span id="sig-conf-val" style="font-size:11px;font-weight:700;
                                            font-family:var(--font-mono);
                                            color:var(--text-primary);min-width:30px">0%</span>
          </div>

          <input type="text" class="search-input" id="sig-search"
                 placeholder="Search symbol..."
                 style="margin-left:auto;max-width:180px">

          <span id="sig-results-count"
                style="font-size:11px;color:var(--text-muted);white-space:nowrap"></span>
        </div>

        <!-- Table -->
        <div style="overflow-x:auto">
          <table class="av-table">
            <thead>
              <tr>
                <th data-sig-sort="symbol" style="cursor:pointer">
                  Symbol <i class="fa-solid fa-sort sort-icon"></i>
                </th>
                <th>Action</th>
                <th data-sig-sort="confidence" style="cursor:pointer;min-width:140px">
                  Confidence <i class="fa-solid fa-sort-down sort-icon"></i>
                </th>
                <th style="text-align:right" data-sig-sort="price">
                  Price <i class="fa-solid fa-sort sort-icon" style="cursor:pointer"></i>
                </th>
                <th style="text-align:right" data-sig-sort="score">
                  Score <i class="fa-solid fa-sort sort-icon" style="cursor:pointer"></i>
                </th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="signals-tbody">
              <tr>
                <td colspan="6" style="text-align:center;padding:40px;color:var(--text-muted)">
                  <i class="fa-solid fa-circle-notch fa-spin"
                     style="color:#3b82f6;font-size:18px;margin-bottom:8px;display:block"></i>
                  Loading ML signals...
                </td>
              </tr>
            </tbody>
          </table>
        </div>
        <div class="pagination-bar" id="signals-pagination"></div>
      </div>

      <!-- Bottom: Strategy Weights + Capital Allocation -->
      <div class="signals-bottom-grid">

        <div class="card" id="strategy-weights-section">
          <div style="text-align:center;padding:20px;color:var(--text-muted)">
            <i class="fa-solid fa-circle-notch fa-spin" style="color:#3b82f6"></i>
          </div>
        </div>

        <div class="card" id="capital-allocation-section">
          <div style="text-align:center;padding:20px;color:var(--text-muted)">
            <i class="fa-solid fa-circle-notch fa-spin" style="color:#3b82f6"></i>
          </div>
        </div>

      </div>
    </div><!-- /page-content -->
  </main>
</div>

<div class="sidebar-overlay" id="sidebar-overlay"></div>
<div id="sdp-fullpage" style="display:none"></div>
<div id="av-toast-wrap"></div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="assets/js/av-config.js"></script>
<script src="assets/js/av-utils.js"></script>
<script src="assets/js/av-api.js"></script>
<script src="assets/js/av-charts.js"></script>
<script src="assets/js/av-portfolio.js"></script>
<script src="assets/js/av-signals.js"></script>
<script src="assets/js/av-agents.js"></script>
<script src="assets/js/av-trading.js"></script>
<script src="assets/js/av-controls.js"></script>
<script src="assets/js/av-stock-detail.js"></script>

<script>
(function _guard() {
  const REQUIRED = {
    'AV_CONFIG':'assets/js/av-config.js','AVUtils':'assets/js/av-utils.js',
    'AVApi':'assets/js/av-api.js','AVSignals':'assets/js/av-signals.js',
    'AVCharts':'assets/js/av-charts.js','AVControls':'assets/js/av-controls.js',
    'StockDetail':'assets/js/av-stock-detail.js',
  };
  const missing = Object.entries(REQUIRED)
    .filter(([n]) => typeof window[n] === 'undefined')
    .map(([n, f]) => `${n} → ${f}`);
  if (missing.length) {
    document.body.insertAdjacentHTML('afterbegin',
      `<div style="position:fixed;top:0;left:0;right:0;z-index:99999;background:#7f1d1d;
                   color:#fecaca;font-family:monospace;font-size:12px;padding:14px 20px;
                   border-bottom:3px solid #ef4444;line-height:1.8">
         <strong>AlphaVault — ${missing.length} missing file(s):</strong><br>
         ${missing.map(m => '&nbsp;• ' + m).join('<br>')}
       </div>`);
    return;
  }
  _initPage().catch(e => console.error('[Signals]', e));
})();

async function _initPage() {
  await AVApi.init();
  AVControls.init();

  const $sb = document.getElementById('sidebar');
  const $ov = document.getElementById('sidebar-overlay');
  document.getElementById('hamburger-btn')?.addEventListener('click', () => {
    $sb.classList.toggle('mobile-open'); $ov.classList.toggle('active');
  });
  $ov?.addEventListener('click', () => {
    $sb.classList.remove('mobile-open'); $ov.classList.remove('active');
  });

  // Normalise signals
  function _normSignals(raw) {
    if (!raw) return [];
    if (Array.isArray(raw.signals)) return raw.signals;
    if (raw.signals && typeof raw.signals === 'object')
      return Object.entries(raw.signals).map(([sym, v]) => ({ symbol: sym, ...v }));
    return [];
  }

  async function _loadAll() {
    const [sigRaw, weightsRaw, allocRaw, modeData] = await Promise.all([
      AVApi.fetchJSON(AV_CONFIG.SIGNAL_URLS.signals,    AV_CONFIG.REFRESH.signals),
      AVApi.fetchJSON(AV_CONFIG.SIGNAL_URLS.weights,    AV_CONFIG.REFRESH.static),
      AVApi.fetchJSON(AV_CONFIG.SIGNAL_URLS.allocation, AV_CONFIG.REFRESH.signals),
      AVApi.getExecutionMode(),
    ]);

    const signals = _normSignals(sigRaw);
    const meta    = {
      n_signals:   safeGet(sigRaw, 'n_signals',   signals.length),
      n_buy:       safeGet(sigRaw, 'n_buy',        signals.filter(s => s.action === 'BUY').length),
      n_sell:      safeGet(sigRaw, 'n_sell',       signals.filter(s => s.action === 'SELL').length),
      n_high_conf: safeGet(sigRaw, 'n_high_conf',
                   signals.filter(s => sf(s.confidence) >= AV_CONFIG.THRESHOLDS.highConf).length),
      n_scanned:   safeGet(sigRaw, 'n_scanned',   safeGet(sigRaw, 'universe_size', 0)),
      universe:    safeGet(sigRaw, 'universe_size', 0),
      updated_at:  safeGet(sigRaw, 'updated_at',  null),
      models:      safeGet(sigRaw, 'models_active', {}),
      thresholds: {
        buy:       safeGet(sigRaw, 'buy_threshold',  AV_CONFIG.THRESHOLDS.buyConf),
        sell:      safeGet(sigRaw, 'sell_threshold', AV_CONFIG.THRESHOLDS.sellConf),
        high_conf: safeGet(sigRaw, 'high_conf_gate', AV_CONFIG.THRESHOLDS.highConf),
      },
    };

    // Header subtitle
    const sub = document.getElementById('sig-header-sub');
    if (sub) sub.textContent =
      `${meta.n_signals} signals · ${meta.n_buy} BUY · ${meta.n_high_conf} high conf`;

    // Renders
    AVSignals.renderStatsBar(meta);
    AVSignals.initFilters(() => AVSignals.renderSignalsTable(signals));
    AVSignals.renderSignalsTable(signals);
    AVSignals.renderStrategyWeights(weightsRaw);
    AVSignals.renderCapitalAllocation(allocRaw);
    AVControls.updateModeBadge(modeData);
  }

  // Auto-refresh 60s
  AVApi.startAutoRefresh({
    signals:    AV_CONFIG.REFRESH.signals,
    allocation: AV_CONFIG.REFRESH.signals,
    mode:       AV_CONFIG.REFRESH.execution,
    onUpdate: async (key, data) => {
      if (key === 'signals') {
        const sigs = _normSignals(data);
        AVSignals.renderSignalsTable(sigs);
        const sub = document.getElementById('sig-header-sub');
        if (sub) sub.textContent =
          `${sigs.length} signals · ${sigs.filter(s => s.action === 'BUY').length} BUY`;
      }
      if (key === 'allocation') AVSignals.renderCapitalAllocation(data);
      if (key === 'mode')       AVControls.updateModeBadge(data);
      await AVApi.updateSidebarStatus();
    },
  });

  await _loadAll();
}
</script>
</body>
</html>
