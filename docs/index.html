<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="0; url=dashboard.html">
  <title>AlphaVault Quant v5.0.9</title>

  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="shortcut icon" href="favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="mask-icon" href="safari-pinned-tab.svg" color="#667eea">
  <link rel="icon" type="image/png" sizes="192x192" href="android-chrome-192x192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="android-chrome-512x512.png">

  <style>
    :root { --brand: linear-gradient(135deg,#3b82f6 0%,#8b5cf6 100%); }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
      background:  #f1f5f9;
      display:     flex;
      align-items: center;
      justify-content: center;
      min-height:  100vh;
      overflow:    hidden;
    }
    .splash {
      display:        flex;
      flex-direction: column;
      align-items:    center;
      gap:            20px;
      animation:      fadeUp 0.5s ease both;
    }
    .splash-logo {
      width:         72px;
      height:        72px;
      object-fit:    contain;
      border-radius: 16px;
      box-shadow:    0 8px 28px rgba(59,130,246,0.30);
      animation:     glow 2s ease-in-out infinite;
    }
    .splash-title {
      font-size:      26px;
      font-weight:    900;
      background:     var(--brand);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }
    .splash-sub {
      font-size:  12px;
      color:      #94a3b8;
      font-family:'JetBrains Mono',monospace;
      letter-spacing: 0.5px;
    }
    .splash-bar {
      width:         200px;
      height:        3px;
      background:    rgba(148,163,184,0.20);
      border-radius: 9999px;
      overflow:      hidden;
    }
    .splash-fill {
      height:        100%;
      background:    var(--brand);
      border-radius: 9999px;
      animation:     load 0.6s ease forwards;
    }
    .splash-redirect {
      font-size: 11px;
      color:     #94a3b8;
    }
    .splash-redirect a { color: #3b82f6; text-decoration: none; }
    .splash-redirect a:hover { text-decoration: underline; }

    @keyframes fadeUp {
      from { opacity:0; transform:translateY(16px); }
      to   { opacity:1; transform:translateY(0); }
    }
    @keyframes load {
      from { width:0%; }
      to   { width:100%; }
    }
    @keyframes glow {
      0%,100% { box-shadow:0 8px 28px rgba(59,130,246,0.30); }
      50%      { box-shadow:0 8px 36px rgba(139,92,246,0.45); }
    }
  </style>
</head>
<body>
  <div class="splash">
    <img class="splash-logo" src="assets/images/alpha-logo.png" alt="AlphaVault Quant">
    <div class="splash-title">AlphaVault Quant</div>
    <div class="splash-sub">v5.0.9 — Multi-Agent Trading System</div>
    <div class="splash-bar"><div class="splash-fill"></div></div>
    <div class="splash-redirect">
      Redirecting to dashboard&hellip; &nbsp;
      <a href="dashboard.html">Click here if not redirected</a>
    </div>
  </div>
  <script>setTimeout(()=>{ window.location.href='dashboard.html'; },600);</script>
</body>
</html>
