name: Weekly Recap Email

on:
  schedule:
    - cron: '0 8 * * 6'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  weekly-recap:
    name: Send Weekly Recap
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Send Weekly Recap Email
        env:
          RESEND_API_KEY:    ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
          GH_PAGES_BASE:     https://raph33ai.github.io/alphavault-quant/signals
        run: |
          python3 << 'PYEOF'
          import json, os, urllib.request, urllib.error, datetime

          BASE     = os.environ.get("GH_PAGES_BASE", "")
          API_KEY  = os.environ.get("RESEND_API_KEY", "")
          FROM     = os.environ.get("RESEND_FROM_EMAIL", "")
          TODAY    = datetime.date.today()
          WEEK_START = TODAY - datetime.timedelta(days=6)
          DATE_RANGE = f"{WEEK_START.strftime('%b %d')} – {TODAY.strftime('%b %d, %Y')}"

          def fetch(path):
              try:
                  req = urllib.request.Request(
                      f"{BASE}/{path}",
                      headers={"Cache-Control": "no-cache"}
                  )
                  with urllib.request.urlopen(req, timeout=10) as r:
                      return json.loads(r.read().decode())
              except Exception as e:
                  print(f"  Fetch {path}: {e}")
                  return {}

          def send(to_list, subject, html):
              if not API_KEY:
                  print("  RESEND_API_KEY not set"); return
              if not to_list:
                  print("  No recipients"); return
              payload = json.dumps({"from": FROM, "to": to_list,
                                    "subject": subject, "html": html}).encode()
              req = urllib.request.Request(
                  "https://api.resend.com/emails",
                  data=payload, method="POST",
                  headers={"Authorization": f"Bearer {API_KEY}",
                           "Content-Type": "application/json"}
              )
              try:
                  with urllib.request.urlopen(req, timeout=15) as r:
                      d = json.loads(r.read().decode())
                      print(f"  Sent: {d.get('id','ok')}")
              except urllib.error.HTTPError as e:
                  print(f"  Resend {e.code}: {e.read().decode()[:300]}")
              except Exception as e:
                  print(f"  Error: {e}")

          settings  = fetch("notification_settings.json")
          emails    = settings.get("emails", [])
          if not settings.get("notify_weekly_recap", True):
              print("Weekly recap disabled — skipping"); exit(0)
          if not emails:
              print("No email addresses — skipping"); exit(0)

          signals   = fetch("current_signals.json")
          regime    = fetch("regime.json")
          risk      = fetch("risk_metrics.json")
          portfolio = fetch("portfolio.json")
          status    = fetch("system_status.json")
          ibkr      = fetch("ibkr_status.json")
          exec_mode = fetch("execution_mode.json")
          perf      = fetch("performance_metrics.json")

          sigs_data    = signals.get("signals", {})
          glob_regime  = regime.get("global", {})
          regime_label = glob_regime.get("regime_label", "unknown").replace("_"," ").title()
          regime_conf  = float(glob_regime.get("confidence", 0))

          dd_pct     = abs(float(risk.get("drawdown",{}).get("current_drawdown",0))*100)
          port_val   = float(portfolio.get("total_value", 100000))
          n_sigs     = len(sigs_data)
          buy_sigs   = sum(1 for s in sigs_data.values() if s.get("direction")=="buy")
          sell_sigs  = sum(1 for s in sigs_data.values() if s.get("direction")=="sell")
          exec_sigs  = sum(1 for s in sigs_data.values() if "execute" in s.get("council",""))
          leverage   = float(risk.get("leverage",{}).get("current_leverage",0))

          mode_trade = ibkr.get("trading_mode","paper").upper()
          exec_m     = exec_mode.get("execution_mode","auto").upper()
          exec_color = "#f59e0b" if exec_m=="MANUAL" else "#10b981"

          regime_colors = {
              "Trend Up":"#10b981","Trend Down":"#ef4444","Range Bound":"#64748b",
              "High Volatility":"#f59e0b","Low Volatility":"#06b6d4",
              "Crash":"#dc2626","Macro Tightening":"#f97316","Macro Easing":"#8b5cf6",
          }
          rc = regime_colors.get(regime_label,"#64748b")

          # Strategy weights
          sw = perf.get("weights",{}) or signals.get("strategy_weights",{}) or \
               {"trend":0.40,"mean_reversion":0.25,"vol_carry":0.20,"options_convexity":0.15}
          strat_rows = "".join([
              f"""<tr style="border-bottom:1px solid #f1f5f9">
                <td style="padding:8px 12px;color:#1e293b;font-weight:600">{k.replace("_"," ").title()}</td>
                <td style="padding:8px 12px;font-family:monospace;color:#3b82f6;font-weight:700">{float(v)*100:.0f}%</td>
              </tr>""" for k,v in sw.items()
          ])

          html = f"""<!DOCTYPE html>
          <html><head><meta charset="UTF-8"></head>
          <body style="margin:0;padding:32px 16px;font-family:'Inter',-apple-system,sans-serif;background:#f8fafc">
          <div style="max-width:600px;margin:0 auto">

            <div style="background:linear-gradient(135deg,#1e1b4b,#312e81);border-radius:16px 16px 0 0;padding:32px;text-align:center">
              <div style="font-size:10px;font-weight:800;letter-spacing:2px;color:#6366f1;text-transform:uppercase;margin-bottom:8px">AlphaVault Quant</div>
              <div style="font-size:24px;font-weight:900;color:white;margin-bottom:4px">Weekly Recap</div>
              <div style="font-size:13px;color:#94a3b8">{DATE_RANGE}</div>
            </div>

            <div style="background:#312e81;padding:12px 32px">
              <span style="font-size:11px;color:#a5b4fc;font-weight:600">Account: </span>
              <span style="font-size:12px;font-weight:800;color:{'#ef4444' if mode_trade=='LIVE' else '#60a5fa'}">{mode_trade}</span>
              <span style="font-size:11px;color:#a5b4fc;font-weight:600;margin-left:16px">Execution: </span>
              <span style="font-size:12px;font-weight:800;color:{exec_color}">{exec_m}</span>
            </div>

            <div style="background:white;border-radius:0 0 16px 16px;padding:32px;box-shadow:0 4px 24px rgba(0,0,0,0.06)">

              <!-- KPIs -->
              <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:28px">
                <div style="text-align:center;padding:16px;background:#f8fafc;border-radius:10px;border:1px solid #e2e8f0">
                  <div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:#94a3b8;margin-bottom:6px">Portfolio</div>
                  <div style="font-size:20px;font-weight:900;color:#1e293b;font-family:monospace">${port_val:,.0f}</div>
                </div>
                <div style="text-align:center;padding:16px;background:#f8fafc;border-radius:10px;border:1px solid #e2e8f0">
                  <div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:#94a3b8;margin-bottom:6px">Max Drawdown</div>
                  <div style="font-size:20px;font-weight:900;color:{'#ef4444' if dd_pct>5 else '#10b981'};font-family:monospace">{dd_pct:.2f}%</div>
                </div>
                <div style="text-align:center;padding:16px;background:#f8fafc;border-radius:10px;border:1px solid #e2e8f0">
                  <div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:#94a3b8;margin-bottom:6px">Signals (latest)</div>
                  <div style="font-size:20px;font-weight:900;color:#1e293b;font-family:monospace">{n_sigs}</div>
                  <div style="font-size:10px;color:#94a3b8;margin-top:2px">{buy_sigs}B · {sell_sigs}S · {exec_sigs} exec</div>
                </div>
              </div>

              <!-- Regime -->
              <div style="background:{rc}0a;border:1px solid {rc}30;border-radius:10px;padding:16px;margin-bottom:24px">
                <div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#94a3b8;margin-bottom:6px">Current Market Regime</div>
                <div style="font-size:20px;font-weight:900;color:{rc};margin-bottom:4px">{regime_label}</div>
                <div style="font-size:12px;color:#64748b">Confidence: {regime_conf:.0%} · Leverage: {leverage:.2f}x</div>
              </div>

              <!-- Strategy Allocation -->
              <div style="margin-bottom:24px">
                <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#94a3b8;margin-bottom:12px">Strategy Allocation</div>
                <table style="width:100%;border-collapse:collapse;font-size:12px">
                  <thead>
                    <tr style="background:#f8fafc">
                      <th style="padding:8px 12px;text-align:left;font-size:9px;text-transform:uppercase;color:#94a3b8;font-weight:700">Strategy</th>
                      <th style="padding:8px 12px;text-align:left;font-size:9px;text-transform:uppercase;color:#94a3b8;font-weight:700">Weight</th>
                    </tr>
                  </thead>
                  <tbody>{strat_rows}</tbody>
                </table>
              </div>

              <!-- Note -->
              <div style="background:#fef9c3;border:1px solid #fde047;border-radius:8px;padding:12px;margin-bottom:20px;font-size:11px;color:#854d0e">
                <strong>Note:</strong> This recap shows the current system state (snapshot).
                Cumulative trade history requires a database (planned feature).
                The system is running in <strong>{mode_trade} mode</strong> with execution <strong>{exec_m}</strong>.
              </div>

              <!-- Footer -->
              <div style="border-top:1px solid #f1f5f9;padding-top:20px;text-align:center">
                <a href="https://raph33ai.github.io/alphavault-quant/" style="display:inline-block;background:linear-gradient(135deg,#4f46e5,#7c3aed);color:white;text-decoration:none;padding:10px 24px;border-radius:8px;font-size:13px;font-weight:700;margin-bottom:16px">Open Dashboard</a>
                <div style="font-size:10px;color:#94a3b8">
                  AlphaVault Quant · Weekly recap every Saturday 08:00 UTC<br>
                  <a href="https://github.com/Raph33AI/alphavault-quant/actions" style="color:#6366f1;text-decoration:none">GitHub Actions</a>
                </div>
              </div>
            </div>
          </div>
          </body></html>"""

          send(emails, f"[AlphaVault Quant] Weekly Recap — {DATE_RANGE}", html)
          print(f"Weekly recap sent to {len(emails)} recipients")
          PYEOF