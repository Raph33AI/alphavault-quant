# ============================================================
# daily-recap.yml — AlphaVault Quant v2.6
# Envoie un recap quotidien par email à 21h30 UTC (lun-ven)
# Appelle le Cloudflare Worker qui lit les JSON et envoie via Resend
# ============================================================

name: Daily Recap Email

on:
  schedule:
    - cron: '30 21 * * 1-5'   # Lundi-Vendredi 21h30 UTC (après clôture NYSE)
  workflow_dispatch:            # Déclencement manuel pour test

permissions:
  contents: read

jobs:
  send-daily-recap:
    name: Send Daily Recap Email
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:

      # ── 1. Lecture des JSON depuis GitHub Pages ────────────
      - name: Fetch signals data from GitHub Pages
        id: fetch
        run: |
          BASE="https://raph33ai.github.io/alphavault-quant/signals"

          echo "Fetching JSON signals from GitHub Pages..."

          python3 << 'PYEOF'
          import json, os, urllib.request

          BASE = "https://raph33ai.github.io/alphavault-quant/signals"

          def fetch_json(name):
              url = f"{BASE}/{name}?t=$(date +%s)"
              try:
                  req = urllib.request.Request(url, headers={'Cache-Control': 'no-cache'})
                  with urllib.request.urlopen(req, timeout=10) as r:
                      data = json.loads(r.read())
                      print(f"  OK {name} ({len(str(data))} chars)")
                      return data
              except Exception as e:
                  print(f"  WARN {name}: {e}")
                  return {}

          payload = {
              "type":                "daily",
              "signals":             fetch_json("current_signals.json"),
              "performance_metrics": fetch_json("performance_metrics.json"),
              "portfolio":           fetch_json("portfolio.json"),
              "risk_metrics":        fetch_json("risk_metrics.json"),
              "performance_history": fetch_json("performance_history.json"),
          }

          # Sauvegarde le payload pour l'étape suivante
          with open("/tmp/recap_payload.json", "w") as f:
              json.dump(payload, f)

          print(f"\nPayload ready — keys: {list(payload.keys())}")
          PYEOF

      # ── 2. Envoi via Cloudflare Worker ─────────────────────
      - name: Send recap email via Worker
        env:
          RECAP_SECRET: ${{ secrets.RECAP_SECRET }}
          WORKER_URL: https://alphavault-gh-proxy.raphnardone.workers.dev
        run: |
          python3 << 'PYEOF'
          import json, os, urllib.request, urllib.error, sys

          worker_url  = os.environ.get("WORKER_URL", "")
          recap_secret = os.environ.get("RECAP_SECRET", "")

          if not recap_secret:
              print("ERROR: RECAP_SECRET not set in GitHub Secrets")
              sys.exit(1)

          # Charge le payload
          with open("/tmp/recap_payload.json") as f:
              payload = json.load(f)

          data = json.dumps(payload).encode("utf-8")

          req = urllib.request.Request(
              f"{worker_url}/send-recap",
              data=data,
              method="POST",
              headers={
                  "Content-Type":  "application/json",
                  "Authorization": f"Bearer {recap_secret}",
              },
          )

          try:
              with urllib.request.urlopen(req, timeout=20) as r:
                  body = r.read().decode()
                  print(f"SUCCESS — HTTP {r.status} | {body}")
          except urllib.error.HTTPError as e:
              body = e.read().decode()
              print(f"ERROR HTTP {e.code} — {body}")
              if e.code == 401:
                  print("Check RECAP_SECRET matches Cloudflare Worker secret")
              sys.exit(1)
          except Exception as e:
              print(f"NETWORK ERROR: {e}")
              sys.exit(1)
          PYEOF

      # ── 3. Summary ─────────────────────────────────────────
      - name: Summary
        if: always()
        run: |
          echo "===================================="
          echo "  Daily Recap — $(date -u '+%Y-%m-%d %H:%M UTC')"
          echo "  Target: alphavault-gh-proxy /send-recap"
          echo "  Recipients: from notification_settings.json"
          echo "===================================="