# ============================================================
# switch-execution-mode.yml — AlphaVault Quant
# AUTO ↔ MANUAL — Sans SSH (GitHub Variable suffit)
#
# Pourquoi sans SSH ?
#   - trading_loop.py lit vars.TRADE_AUTO_MODE directement
#   - En MANUAL, le pipeline ne génère AUCUN ordre → pending_orders.json vide
#   - ibkr_watcher.py poll_and_execute() ne trouve rien → rien à bloquer
#   - Le switch est donc 100% effectif via GitHub Variable seule
# ============================================================

name: Switch Execution Mode

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Execution mode'
        required: true
        type: choice
        options:
          - auto
          - manual

permissions:
  contents: write

jobs:
  switch-execution-mode:
    name: Switch to ${{ inputs.mode }}
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:

      # ── 1. Validation ────────────────────────────────────
      - name: Validate mode
        run: |
          if [[ "${{ inputs.mode }}" != "auto" && "${{ inputs.mode }}" != "manual" ]]; then
            echo "Invalid mode: ${{ inputs.mode }}"
            exit 1
          fi
          echo "Mode validated: ${{ inputs.mode }}"

      # ── 2. Update GitHub Variable TRADE_AUTO_MODE ─────────
      # Source of truth for trading_loop.py (reads vars.TRADE_AUTO_MODE)
      - name: Update GitHub Variable TRADE_AUTO_MODE
        env:
          GH_TOKEN:  ${{ secrets.GITHUB_TOKEN }}
          NEW_MODE:  ${{ inputs.mode }}
          GH_REPO:   ${{ github.repository }}
        run: |
          python3 << 'EOF'
          import os, json, urllib.request, urllib.error

          mode  = os.environ.get('NEW_MODE', 'auto')
          value = 'enabled' if mode == 'auto' else 'disabled'
          repo  = os.environ.get('GH_REPO', '')
          token = os.environ.get('GH_TOKEN', '')

          url  = f'https://api.github.com/repos/{repo}/actions/variables/TRADE_AUTO_MODE'
          data = json.dumps({'name': 'TRADE_AUTO_MODE', 'value': value}).encode()

          def make_req(method):
              req = urllib.request.Request(url, data=data, method=method)
              req.add_header('Authorization',        f'Bearer {token}')
              req.add_header('Accept',               'application/vnd.github.v3+json')
              req.add_header('Content-Type',         'application/json')
              req.add_header('X-GitHub-Api-Version', '2022-11-28')
              return req

          try:
              with urllib.request.urlopen(make_req('PATCH')) as r:
                  print(f"TRADE_AUTO_MODE = '{value}' (updated) | HTTP {r.status}")
          except urllib.error.HTTPError as e:
              if e.code == 404:
                  try:
                      with urllib.request.urlopen(make_req('POST')) as r:
                          print(f"TRADE_AUTO_MODE = '{value}' (created) | HTTP {r.status}")
                  except Exception as e2:
                      print(f"Could not create variable: {e2}")
                      print("Create manually: Settings > Variables > TRADE_AUTO_MODE")
              else:
                  print(f"HTTP {e.code}: {e.read().decode()[:200]}")
          except Exception as e:
              print(f"Network error: {e}")
          EOF

    # ── 2b. Email notification ───────────────────────────
      - name: Send Switch Notification Email
        if: always()
        env:
          RESEND_API_KEY:    ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
          NEW_MODE:          ${{ inputs.mode }}
          GH_PAGES_BASE:     https://raph33ai.github.io/alphavault-quant/signals
          RUN_URL:           ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python3 << 'PYEOF'
          import json, os, urllib.request, urllib.error, datetime

          BASE    = os.environ.get("GH_PAGES_BASE","")
          API_KEY = os.environ.get("RESEND_API_KEY","")
          FROM    = os.environ.get("RESEND_FROM_EMAIL","")
          MODE    = os.environ.get("NEW_MODE","auto").upper()
          RUN_URL = os.environ.get("RUN_URL","")
          NOW     = datetime.datetime.utcnow().strftime("%Y-%m-%d %H:%M UTC")

          def fetch(path):
              try:
                  req = urllib.request.Request(f"{BASE}/{path}", headers={"Cache-Control":"no-cache"})
                  with urllib.request.urlopen(req, timeout=8) as r:
                      return json.loads(r.read().decode())
              except: return {}

          settings = fetch("notification_settings.json")
          emails   = settings.get("emails", [])
          if not settings.get("notify_switch_exec_mode", True) or not emails:
              print("Exec mode email disabled or no recipients"); exit(0)
          if not API_KEY: print("No RESEND_API_KEY"); exit(0)

          color = "#f59e0b" if MODE=="MANUAL" else "#10b981"
          bg    = "#fffbeb" if MODE=="MANUAL" else "#f0fdf4"
          bord  = "#fde68a" if MODE=="MANUAL" else "#bbf7d0"
          desc  = ("ML orders blocked — Trading Terminal still active."
                   if MODE=="MANUAL" else
                   "Full pipeline active — orders transmitted every 5 min.")

          html = f"""<!DOCTYPE html><html><head><meta charset="UTF-8"></head>
          <body style="margin:0;padding:32px 16px;font-family:'Inter',-apple-system,sans-serif;background:#f8fafc">
          <div style="max-width:520px;margin:0 auto;background:white;border-radius:16px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,0.08)">
            <div style="background:linear-gradient(135deg,#0f172a,#1e293b);padding:28px;text-align:center">
              <div style="font-size:10px;font-weight:800;letter-spacing:2px;color:#475569;text-transform:uppercase;margin-bottom:8px">AlphaVault Quant</div>
              <div style="font-size:22px;font-weight:900;color:white">Execution Mode Switched</div>
              <div style="font-size:12px;color:#64748b;margin-top:4px">{NOW}</div>
            </div>
            <div style="padding:28px">
              <div style="background:{bg};border:1px solid {bord};border-radius:10px;padding:20px;text-align:center;margin-bottom:20px">
                <div style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:{color};margin-bottom:6px">New Mode</div>
                <div style="font-size:32px;font-weight:900;color:{color}">{MODE}</div>
                <div style="font-size:12px;color:#64748b;margin-top:8px">{desc}</div>
              </div>
              <div style="font-size:11px;color:#94a3b8;text-align:center">
                <a href="{RUN_URL}" style="color:{color};text-decoration:none;font-weight:600">View GitHub Actions Run</a>
                &nbsp;·&nbsp;
                <a href="https://raph33ai.github.io/alphavault-quant/" style="color:{color};text-decoration:none;font-weight:600">Open Dashboard</a>
              </div>
            </div>
          </div>
          </body></html>"""

          payload = json.dumps({"from":FROM,"to":emails,
                                "subject":f"[AlphaVault Quant] Execution Mode → {MODE} | {NOW}",
                                "html":html}).encode()
          req = urllib.request.Request("https://api.resend.com/emails", data=payload, method="POST",
                                        headers={"Authorization":f"Bearer {API_KEY}","Content-Type":"application/json"})
          try:
              with urllib.request.urlopen(req, timeout=15) as r:
                  d = json.loads(r.read().decode())
                  print(f"Email sent: {d.get('id','ok')} to {len(emails)} recipients")
          except urllib.error.HTTPError as e:
              print(f"Resend {e.code}: {e.read().decode()[:200]}")
          except Exception as e:
              print(f"Error: {e}")
          PYEOF

      # ── 3. Checkout + push execution_mode.json ────────────
      - name: Checkout
        uses: actions/checkout@v4

      - name: Push execution_mode.json to GitHub Pages
        run: |
          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          MODE="${{ inputs.mode }}"

          mkdir -p docs/signals

          if [ "$MODE" = "auto" ]; then
            TRADE_AUTO="true"
            LABEL="AUTO — Full pipeline active, orders transmitted"
          else
            TRADE_AUTO="false"
            LABEL="MANUAL — ML orders blocked, Trading Terminal active"
          fi

          cat > docs/signals/execution_mode.json << JSONEOF
          {
            "execution_mode":   "${MODE}",
            "trade_auto":       ${TRADE_AUTO},
            "label":            "${LABEL}",
            "updated_at":       "${NOW}",
            "updated_by":       "dashboard_switch",
            "run_number":       "${{ github.run_number }}"
          }
          JSONEOF

          git config user.name  "AlphaVault Bot"
          git config user.email "bot@alphavault-ai.com"
          git add docs/signals/execution_mode.json
          git commit -m "Execution mode → ${MODE} | ${NOW}" || echo "Nothing to commit"
          git push || echo "Push failed"

          echo "execution_mode.json pushed"
          echo "URL: https://raph33ai.github.io/alphavault-quant/signals/execution_mode.json"

      # ── 4. Summary ────────────────────────────────────────
      - name: Summary
        run: |
          echo "================================"
          echo "  EXECUTION MODE: ${{ inputs.mode }}"
          echo "  Run: #${{ github.run_number }}"
          echo "================================"
          if [ "${{ inputs.mode }}" = "manual" ]; then
            echo "  MANUAL MODE ACTIVE"
            echo "  ML pipeline reads TRADE_AUTO_MODE=disabled"
            echo "  trading_loop.py skips push_execute_orders"
            echo "  No orders written to pending_orders.json"
            echo "  Trading Terminal orders still active"
          else
            echo "  AUTO MODE ACTIVE"
            echo "  TRADE_AUTO_MODE=enabled"
            echo "  Full pipeline + order transmission active"
          fi
          echo "================================"