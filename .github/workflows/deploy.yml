# .github/workflows/deploy.yml
name: Deploy AlphaVault Quant to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:

      # ── 1. Checkout ──────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Générer firebase-config.js depuis les secrets ─────
      - name: Generate Firebase Config
        env:
          FB_API_KEY:    ${{ secrets.FIREBASE_API_KEY }}
          FB_AUTH:       ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FB_PROJECT:    ${{ secrets.FIREBASE_PROJECT_ID }}
          FB_BUCKET:     ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FB_SENDER:     ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FB_APP_ID:     ${{ secrets.FIREBASE_APP_ID }}
        run: |
          mkdir -p docs/assets/js

          cat > docs/assets/js/firebase-config.js << ENDOFFILE
          // Auto-generated by GitHub Actions — DO NOT EDIT
          // Generated: $(date -u '+%Y-%m-%d %H:%M:%S UTC')
          window.FIREBASE_CONFIG = {
            apiKey:            "${FB_API_KEY}",
            authDomain:        "${FB_AUTH}",
            projectId:         "${FB_PROJECT}",
            storageBucket:     "${FB_BUCKET}",
            messagingSenderId: "${FB_SENDER}",
            appId:             "${FB_APP_ID}"
          };
          ENDOFFILE

          echo "✅ firebase-config.js generated"
          echo "   Project: ${FB_PROJECT}"
          echo "   Auth domain: ${FB_AUTH}"

      # ── 3. Vérification (sans exposer les valeurs) ───────────
      - name: Verify generated file
        run: |
          if [ -f docs/assets/js/firebase-config.js ]; then
            echo "✅ File exists — $(wc -c < docs/assets/js/firebase-config.js) bytes"
            grep -q "FIREBASE_CONFIG" docs/assets/js/firebase-config.js \
              && echo "✅ FIREBASE_CONFIG key found" \
              || echo "❌ FIREBASE_CONFIG key missing"
          else
            echo "❌ File not found!"
            exit 1
          fi

      # ── 4. Déployer sur GitHub Pages ─────────────────────────
      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4