name: Deploy AlphaVault Quant to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate Firebase config (from secrets)
        run: |
          mkdir -p docs/assets/js
          cat > docs/assets/js/firebase-config.js << EOF
          // ⚡ AlphaVault Quant — Firebase Config
          // Auto-generated by GitHub Actions — DO NOT COMMIT
          window.FIREBASE_CONFIG = {
            apiKey:            "${FIREBASE_API_KEY}",
            authDomain:        "${FIREBASE_AUTH_DOMAIN}",
            projectId:         "${FIREBASE_PROJECT_ID}",
            storageBucket:     "${FIREBASE_STORAGE_BUCKET}",
            messagingSenderId: "${FIREBASE_MESSAGING_SENDER_ID}",
            appId:             "${FIREBASE_APP_ID}"
          };
          console.log('%c✅ Firebase config loaded (injected by CI/CD)', 'color:#10b981;font-weight:bold;');
          EOF
        env:
          FIREBASE_API_KEY:             ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN:         ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID:          ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET:      ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID:              ${{ secrets.FIREBASE_APP_ID }}

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4