# ============================================================
# ALPHAVAULT QUANT — DAILY MODEL TRAINING
# Re-training quotidien des modèles ML (XGBoost, LightGBM...)
# Exécution : Chaque jour à 07:00 UTC (avant ouverture marché)
# ============================================================

name: 🧠 Daily Model Training — AlphaVault Quant

on:
  schedule:
    - cron: '0 7 * * 1-5'  # 07:00 UTC, Lundi-Vendredi
  workflow_dispatch:
    inputs:
      force_full_retrain:
        description: 'Force re-training complet (ignore cache)'
        required: false
        default: 'false'
        type: boolean
      symbols:
        description: 'Symbols à entraîner (ex: SPY,QQQ,AAPL)'
        required: false
        default: 'SPY,QQQ,IWM,AAPL,NVDA,MSFT,GOOGL,AMZN,META,TSLA'

concurrency:
  group: model-training
  cancel-in-progress: false

jobs:
  train-models:
    name: 🧠 Model Training Pipeline
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'

      - name: 📦 Install Dependencies
        run: |
          pip install --upgrade pip --quiet
          pip install -r requirements.txt --quiet

      - name: 🧠 Run Model Training
        env:
          FINANCE_HUB_URL:   ${{ secrets.FINANCE_HUB_URL }}
          ECONOMIC_DATA_URL: ${{ secrets.ECONOMIC_DATA_URL }}
          AI_PROXY_URL:      ${{ secrets.AI_PROXY_URL }}
          FORCE_RETRAIN:     ${{ github.event.inputs.force_full_retrain || 'false' }}
          TRAINING_SYMBOLS:  ${{ github.event.inputs.symbols || 'SPY,QQQ,IWM,AAPL,NVDA,MSFT,GOOGL,AMZN,META,TSLA' }}
        run: |
          cd backend
          python -m core.signal_model --mode=train
        timeout-minutes: 30

      - name: 💾 Commit Trained Models
        run: |
          git config --global user.name  "AlphaVault Quant Bot"
          git config --global user.email "bot@alphavault-ai.com"
          git add models/
          git add signals/performance_metrics.json
          git diff --staged --quiet || git commit -m "🧠 Model retrain — $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📊 Upload Training Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: training-results-${{ github.run_number }}
          path: |
            models/
            backend/logs/training_*.log
          retention-days: 14