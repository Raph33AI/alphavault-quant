# ============================================================
# ALPHAVAULT QUANT — TRADING LOOP
# Boucle de trading principale — GitHub Actions
# Fix : IBKR Status Check en lecture seule (watcher gère le fichier)
# ============================================================

name: 🤖 Trading Loop — AlphaVault Quant

on:
  schedule:
    - cron: '*/5 14-21 * * 1-5'
    - cron: '*/15 13-14 * * 1-5'
    - cron: '*/15 21-23 * * 1-5'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mode d execution'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto
          - signal_only
          - risk_check_only
      dry_run:
        description: 'Dry run'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: trading-loop
  cancel-in-progress: false

jobs:

  # ── Job 1 : Vérification horaires ──────────────────────────
  market-hours-check:
    name: 🕐 Vérification Heures de Marché
    runs-on: ubuntu-latest
    outputs:
      is_market_open: ${{ steps.check.outputs.is_open }}
      market_session: ${{ steps.check.outputs.session }}
    steps:
      - name: Check Market Hours
        id: check
        run: |
          python3 << 'EOF'
          import datetime, os
          now_utc    = datetime.datetime.utcnow()
          weekday    = now_utc.weekday()
          time_dec   = now_utc.hour + now_utc.minute / 60
          is_weekday = weekday < 5
          is_pre     = is_weekday and 13.0 <= time_dec < 14.5
          is_regular = is_weekday and 14.5 <= time_dec < 21.0
          is_post    = is_weekday and 21.0 <= time_dec < 24.0
          is_open    = is_pre or is_regular or is_post
          session    = (
              "regular"     if is_regular else
              "premarket"   if is_pre     else
              "postmarket"  if is_post    else
              "closed"
          )
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"is_open={'true' if is_open else 'false'}\n")
              f.write(f"session={session}\n")
          print(
              f"🕐 {now_utc.strftime('%H:%M')} UTC | "
              f"weekday={weekday} | session={session} | open={is_open}"
          )
          EOF

  # ── Job 2 : Boucle de trading ──────────────────────────────
  trading-loop:
    name: 🤖 Boucle de Trading Principale
    runs-on: ubuntu-latest
    needs: market-hours-check
    if: needs.market-hours-check.outputs.is_market_open == 'true' || github.event_name == 'workflow_dispatch'

    permissions:
      contents: write

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel --quiet
          pip install -r requirements.txt \
            --timeout 120 \
            --retries 3 \
            --quiet
          echo "✅ Python $(python --version)"
          echo "✅ pip $(pip --version)"
          echo "✅ Packages installés:"
          pip list | grep -E "numpy|pandas|xgboost|lightgbm|scikit|loguru|pydantic|httpx"

      - name: 🔍 Verify Imports
        run: |
          python3 << 'EOF'
          import sys
          print(f"Python {sys.version}")
          checks = [
              ("numpy",        "np.__version__"),
              ("pandas",       "pd.__version__"),
              ("xgboost",      "xgb.__version__"),
              ("lightgbm",     "lgb.__version__"),
              ("sklearn",      "sklearn.__version__"),
          ]
          failed = False
          import numpy as np
          import pandas as pd
          import xgboost as xgb
          import lightgbm as lgb
          import sklearn
          from loguru import logger
          for pkg, ver_expr in checks:
              try:
                  mod = __import__(pkg)
                  ver = getattr(mod, "__version__", "?")
                  print(f"✅ {pkg} {ver}")
              except ImportError as e:
                  print(f"❌ {pkg}: {e}")
                  failed = True
          print("✅ loguru OK")
          if failed:
              sys.exit(1)
          print("\n🚀 Tous les imports critiques OK !")
          EOF

      # ── Exécution principale ─────────────────────────────────
      - name: 🚀 Run Trading Loop
        env:
          FINANCE_HUB_URL:     ${{ secrets.FINANCE_HUB_URL }}
          AI_PROXY_URL:        ${{ secrets.AI_PROXY_URL }}
          ECONOMIC_DATA_URL:   ${{ secrets.ECONOMIC_DATA_URL }}
          IBKR_HOST:           ${{ secrets.IBKR_HOST }}
          IBKR_PORT:           ${{ secrets.IBKR_PORT }}
          IBKR_CLIENT_ID:      ${{ secrets.IBKR_CLIENT_ID }}
          IBKR_ACCOUNT:        ${{ secrets.IBKR_ACCOUNT }}
          EXECUTION_MODE:      ${{ github.event.inputs.mode || 'signal_only' }}
          DRY_RUN:             ${{ github.event.inputs.dry_run || 'false' }}
          MARKET_SESSION:      ${{ needs.market-hours-check.outputs.market_session }}
          GITHUB_REPOSITORY:   ${{ github.repository }}
          GITHUB_RUN_NUMBER:   ${{ github.run_number }}
          GITHUB_RUN_ID:       ${{ github.run_id }}
          GITHUB_SERVER_URL:   ${{ github.server_url }}
          GH_TOKEN:            ${{ secrets.GITHUB_TOKEN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_API_KEY:    ${{ secrets.FIREBASE_API_KEY }}
          RESEND_ALERT_EMAIL:  ${{ secrets.RESEND_ALERT_EMAIL }}
          GROQ_API_KEY:        ${{ secrets.GROQ_API_KEY }}
          TRADE_AUTO_MODE:     ${{ vars.TRADE_AUTO_MODE || 'enabled' }}
        run: |
          python -m backend.orchestrator.trading_loop
        timeout-minutes: 8

      # ════════════════════════════════════════════════════════
      # Génération debug log JSON depuis les signals
      # ════════════════════════════════════════════════════════
      - name: 🐛 Generate Debug Snapshot
        if: always()
        run: |
          python3 << 'EOF'
          import json, os, datetime
          from pathlib import Path

          signals_dir = Path('signals')
          out_dir     = Path('docs/signals')
          out_dir.mkdir(parents=True, exist_ok=True)

          ts  = datetime.datetime.utcnow().isoformat()
          run = os.environ.get('GITHUB_RUN_NUMBER', '?')
          sid = os.environ.get('GITHUB_RUN_ID', '')
          srv = os.environ.get('GITHUB_SERVER_URL', 'https://github.com')
          rep = os.environ.get('GITHUB_REPOSITORY', '')

          # Charge tous les JSON signals
          files_data = {}
          for f in signals_dir.glob('*.json'):
              try:
                  with open(f) as fp:
                      files_data[f.name] = json.load(fp)
              except Exception as e:
                  files_data[f.name] = {'error': str(e)}

          # Charge debug_log existant
          debug_path    = out_dir / 'debug_log.json'
          existing_logs = []
          if debug_path.exists():
              try:
                  existing_logs = json.loads(debug_path.read_text()).get('logs', [])
              except Exception:
                  pass

          # Génère entrées debug pour ce cycle
          new_entries = []

          # Entrée globale du cycle
          new_entries.append({
              'ts':      ts,
              'level':   'INFO',
              'module':  'trading_loop',
              'symbol':  'GLOBAL',
              'message': f'Cycle #{run} terminé | {len(files_data)} fichiers signals',
              'details': {
                  'run_number': run,
                  'run_url':    f'{srv}/{rep}/actions/runs/{sid}',
                  'files':      list(files_data.keys()),
              },
              'run_id': f'run_{run}'
          })

          # Entrée par signal
          signals = files_data.get('current_signals.json', {}).get('signals', {})
          for sym, sig in signals.items():
              new_entries.append({
                  'ts':      ts,
                  'level':   'SIGNAL',
                  'module':  'signal_engine',
                  'symbol':  sym,
                  'message': (
                      f"{sig.get('direction','?').upper()} | "
                      f"score={float(sig.get('final_score', 0)):.3f} | "
                      f"council={sig.get('council','?')}"
                  ),
                  'details': sig,
                  'run_id':  f'run_{run}'
              })

          # Régime global
          regime = files_data.get('regime.json', {}).get('global', {})
          if regime:
              new_entries.append({
                  'ts':      ts,
                  'level':   'REGIME',
                  'module':  'regime_model',
                  'symbol':  'GLOBAL',
                  'message': (
                      f"Régime: {regime.get('regime_label','?')} | "
                      f"score={float(regime.get('regime_score', 0)):+.2f} | "
                      f"conf={float(regime.get('confidence', 0)):.1%}"
                  ),
                  'details': regime,
                  'run_id':  f'run_{run}'
              })

          # Risk metrics
          risk = files_data.get('risk_metrics.json', {})
          dd   = risk.get('drawdown', {})
          lv   = risk.get('leverage', {})
          if dd or lv:
              new_entries.append({
                  'ts':      ts,
                  'level':   'RISK',
                  'module':  'risk_manager',
                  'symbol':  'GLOBAL',
                  'message': (
                      f"DD={float(dd.get('current_drawdown', 0))*100:.2f}% | "
                      f"Lever={float(lv.get('current_leverage', 0)):.2f}x | "
                      f"Halt={dd.get('halt_active', False)}"
                  ),
                  'details': risk,
                  'run_id':  f'run_{run}'
              })

          # Merge et sauvegarde (500 entrées max)
          all_logs = (existing_logs + new_entries)[-500:]
          debug_path.write_text(json.dumps({
              'timestamp': ts,
              'run_id':    f'run_{run}',
              'total':     len(all_logs),
              'logs':      all_logs
          }, indent=2, default=str))

          print(
              f"✅ debug_log.json mis à jour | "
              f"{len(new_entries)} nouvelles entrées | {len(all_logs)} total"
          )
          EOF

      # ════════════════════════════════════════════════════════
      # IBKR Status Check — LECTURE SEULE
      # ⚠ Ne surécrit PAS ibkr_status.json
      # Ce fichier est géré exclusivement par ibkr_watcher.py
      # sur Oracle A1 (push_ibkr_status toutes les 30s)
      # ════════════════════════════════════════════════════════
      - name: 🔌 IBKR Status Check (lecture seule)
        if: always()
        run: |
          python3 << 'EOF'
          import json, datetime
          from pathlib import Path

          # ── IMPORTANT : Ce step NE modifie PAS ibkr_status.json ──────────
          # ibkr_status.json est géré par ibkr_watcher.py (Oracle A1)
          # push_ibkr_status() tourne toutes les 30s avec authenticated=True
          # Écraser ce fichier ici introduirait des données fausses
          # (port 4002 / 5055 inaccessible depuis GitHub Actions runner)
          # ─────────────────────────────────────────────────────────────────

          status_path = Path('docs/signals/ibkr_status.json')
          ts          = datetime.datetime.utcnow().isoformat()

          if status_path.exists():
              try:
                  status    = json.loads(status_path.read_text())
                  connected = status.get('ibkr_connected', False)
                  account   = status.get('account', 'N/A')
                  mode      = status.get('trading_mode', 'N/A')
                  version   = status.get('watcher_version', 'N/A')
                  last_chk  = status.get('last_check', 'N/A')
                  icon      = '✅' if connected else '⚠'
                  print(f"{icon} IBKR Status (watcher Oracle A1):")
                  print(f"   connected      = {connected}")
                  print(f"   account        = {account}")
                  print(f"   trading_mode   = {mode}")
                  print(f"   watcher_version= {version}")
                  print(f"   last_check     = {last_chk}")
              except Exception as e:
                  print(f"⚠ Lecture ibkr_status.json: {e}")
          else:
              print("ℹ ibkr_status.json non présent dans docs/signals/")
              print("  → Le watcher Oracle A1 va le créer au prochain poll (30s)")

          print("")
          print("✅ IBKR Status Check terminé")
          print("   ibkr_status.json NON modifié — géré par ibkr_watcher.py v3.3")
          print(f"   Timestamp vérification : {ts}")
          EOF

      # ════════════════════════════════════════════════════════
      # Copie des signaux vers docs/signals/ (GitHub Pages)
      # ════════════════════════════════════════════════════════
      - name: 📂 Copy signals → docs/signals/ (GitHub Pages)
        if: always()
        run: |
          echo "📂 Création du dossier docs/signals/..."
          mkdir -p docs/signals

          if ls signals/*.json 1> /dev/null 2>&1; then
            echo "📋 Fichiers JSON trouvés dans signals/ :"
            ls -la signals/*.json

            # Copie tous les JSON sauf ibkr_status.json
            # (géré par le watcher Oracle, on ne l'écrase pas)
            for f in signals/*.json; do
              fname=$(basename "$f")
              if [ "$fname" != "ibkr_status.json" ]; then
                cp "$f" "docs/signals/$fname"
                echo "  ✅ $fname copié"
              else
                echo "  ⏭ $fname ignoré (géré par watcher Oracle)"
              fi
            done

            echo ""
            echo "✅ Signaux copiés dans docs/signals/ :"
            ls -la docs/signals/
          else
            echo "⚠ Aucun JSON dans signals/ — création des fichiers par défaut..."

            echo '{"signals":{},"timestamp":null,"session":"closed","llm_mode":"deterministic","dry_run":false}' \
              > docs/signals/current_signals.json

            echo '{"overall":"initializing","llm_available":false,"workers":{},"mode":"deterministic","session":"closed","dry_run":false}' \
              > docs/signals/system_status.json

            echo '{"global":{"regime_label":"initializing","regime_score":0,"confidence":0,"allow_long":false,"allow_short":false,"reduce_exposure":true,"probabilities":{}},"macro":{},"per_symbol":{}}' \
              > docs/signals/regime.json

            echo '{"total_value":100000,"weights":{},"positions":{},"cash_pct":1.0}' \
              > docs/signals/portfolio.json

            echo '{"drawdown":{"current_drawdown":0,"halt_active":false,"daily_pnl_pct":0},"leverage":{"current_leverage":0,"allowed_leverage":1.5,"is_over_leveraged":false},"var_metrics":{}}' \
              > docs/signals/risk_metrics.json

            echo '{"decisions":{},"executions":[]}' \
              > docs/signals/agent_decisions.json

            echo '{"weights":{"trend":0.40,"mean_reversion":0.25,"vol_carry":0.20,"options_convexity":0.15},"regime":"initializing"}' \
              > docs/signals/strategy_weights.json

            echo '{"portfolio_value":100000,"n_signals":0,"n_executions":0,"llm_mode":"deterministic"}' \
              > docs/signals/performance_metrics.json

            echo "✅ Fichiers par défaut créés dans docs/signals/"
          fi

          # .nojekyll pour servir les JSON sans traitement Jekyll
          touch docs/.nojekyll
          echo "✅ .nojekyll présent"

      # ════════════════════════════════════════════════════════
      # Commit et push docs/signals/ vers GitHub Pages
      # ════════════════════════════════════════════════════════
      - name: 💾 Commit & Push docs/signals/ vers GitHub Pages
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "AlphaVault Bot"
          git config user.email "bot@alphavault-ai.com"

          git pull origin HEAD --rebase --autostash || true

          # Stage docs/signals/ mais PAS ibkr_status.json
          # (le watcher Oracle fait son propre push séparé)
          git add docs/signals/
          git add docs/.nojekyll 2>/dev/null || true

          # Dé-stage ibkr_status.json s'il a été ajouté par accident
          git reset HEAD docs/signals/ibkr_status.json 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "ℹ Aucun changement dans docs/signals/ — pas de commit nécessaire"
          else
            TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
            git commit -m "📊 Dashboard signals update — ${TIMESTAMP} [run #${{ github.run_number }}]"
            git push origin HEAD
            echo "✅ docs/signals/ mis à jour sur GitHub Pages"
            echo "🌐 Dashboard : https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
          fi

      # ── Upload logs ──────────────────────────────────────────
      - name: 📊 Upload Logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trading-logs-${{ github.run_number }}
          path: |
            signals/
            docs/signals/
            backend/logs/
          retention-days: 7

      - name: 🚨 Notify on Failure
        if: failure()
        run: |
          echo "❌ Trading Loop FAILED — Run #${{ github.run_number }}"
          echo "📋 URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"