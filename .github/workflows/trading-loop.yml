# ============================================================
# ALPHAVAULT QUANT — TRADING LOOP
# 🌍 Couverture Mondiale : Océanie · Asie · ME · Afrique · EU · Amériques
# Fix : IBKR Status Check en lecture seule (watcher gère le fichier)
# ============================================================

name: 🤖 Trading Loop — AlphaVault Quant

on:
  schedule:
    # ════════════════════════════════════════════════════════════════
    # 🌍 COUVERTURE MARCHÉS MONDIAUX COMPLÈTE — UTC
    # ════════════════════════════════════════════════════════════════

    # ── 🌏 DIMANCHE ─────────────────────────────────────────────────
    # ASX Sydney ouvre dim 23:00 UTC (= lundi 09:00 AEST)
    - cron: '0,15,30,45 23 * * 0'
    # Moyen-Orient dim 06:00-15:30 UTC (DFM/ADX, Tadawul, TASE, QSE)
    # Note : semaine ME = Dim-Jeu (en cron : 0=Dim, 4=Jeu)
    - cron: '*/5 6-15 * * 0'

    # ── 🌍 LUNDI - VENDREDI : Couverture totale 00:00-21:00 UTC ─────
    # 🌏 Asie     : TSE/KRX 00:00 | SSE/HKEX 01:30 | SGX 01:00 | BSE 03:45
    # 🕌 ME       : Dubai/ADX 06:00 | Tadawul 07:00 | TASE 07:00-15:25
    # 🌍 Afrique  : JSE 07:00-15:00 | EGX 08:30-14:30 | NGX 09:30-14:30
    # 🌍 Europe   : XETRA 07:00 | LSE 08:00 | Euronext 08:00-17:30
    # 🌎 Amériques: B3 13:00 | NYSE/NASDAQ 14:30-21:00 | TSX 14:30-21:00
    - cron: '*/5 0-20 * * 1-5'

    # ── 🌎 US POST-MARKET : 21:00-24:00 UTC ─────────────────────────
    - cron: '*/15 21-23 * * 1-5'

  workflow_dispatch:
    inputs:
      mode:
        description: 'Mode d execution'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto
          - signal_only
          - risk_check_only
      dry_run:
        description: 'Dry run'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: trading-loop
  cancel-in-progress: false

jobs:

  # ── Job 1 : Vérification horaires mondiaux ─────────────────
  market-hours-check:
    name: 🌍 Vérification Horaires Mondiaux
    runs-on: ubuntu-latest
    outputs:
      is_market_open: ${{ steps.check.outputs.is_open }}
      market_session: ${{ steps.check.outputs.session }}
    steps:
      - name: Check Global Market Hours
        id: check
        run: |
          python3 << 'EOF'
          import datetime, os

          now_utc  = datetime.datetime.utcnow()
          weekday  = now_utc.weekday()   # Python : 0=Lun ... 6=Dim
          time_dec = now_utc.hour + now_utc.minute / 60

          # ── Jours ouvrés ──────────────────────────────────────────
          WEEKDAYS = frozenset({0,1,2,3,4})   # Lundi-Vendredi
          ME_DAYS  = frozenset({0,1,2,3,6})   # Lun-Jeu + Dim (semaine ME)

          def _open(t, o, c, days=WEEKDAYS):
              return (weekday in days) and (o <= t < c)

          # ── Sessions de marché (UTC) ───────────────────────────────

          # 🌏 OCÉANIE
          # ASX : Lun-Ven 00:00-06:00 + Dim soir 23:00 (pré-ouverture lundi)
          asx      = _open(time_dec, 0.0,  6.0) or (weekday == 6 and time_dec >= 23.0)

          # 🌏 ASIE
          tse      = _open(time_dec, 0.0,  6.0)    # Tokyo Stock Exchange
          krx      = _open(time_dec, 0.0,  6.5)    # Korea Exchange Séoul
          sse      = _open(time_dec, 1.5,  7.0)    # Shanghai / Shenzhen
          hkex     = _open(time_dec, 1.5,  8.0)    # Hong Kong Exchange
          sgx      = _open(time_dec, 1.0,  9.0)    # Singapore Exchange
          bse_nse  = _open(time_dec, 3.75, 10.0)   # Bombay/National (09:15-15:30 IST)

          # 🕌 MOYEN-ORIENT (semaine Dim-Jeu en Python : {6,0,1,2,3})
          dfm_adx  = _open(time_dec, 6.0,  10.0, ME_DAYS)   # Dubai + Abu Dhabi
          tadawul  = _open(time_dec, 7.0,  10.0, ME_DAYS)   # Arabie Saoudite
          tase     = _open(time_dec, 7.0,  15.42,ME_DAYS)   # Israël (close 15:25 UTC)
          qse      = _open(time_dec, 7.0,  10.0, ME_DAYS)   # Qatar Stock Exchange
          msm      = _open(time_dec, 5.75, 9.0,  ME_DAYS)   # Muscat Securities Market Oman

          # 🌍 AFRIQUE
          jse      = _open(time_dec, 7.0,  15.0)    # Johannesburg Stock Exchange
          egx      = _open(time_dec, 8.5,  14.5)    # Egyptian Exchange Le Caire
          ngx      = _open(time_dec, 9.5,  14.5)    # Nigerian Exchange Lagos
          nse_ke   = _open(time_dec, 6.0,  12.0)    # Nairobi Securities Exchange Kenya
          gse      = _open(time_dec, 9.0,  14.0)    # Ghana Stock Exchange
          bvmac    = _open(time_dec, 9.0,  13.5)    # Casablanca + BRVM Afrique de l'Ouest

          # 🌍 EUROPE
          xetra    = _open(time_dec, 7.0,  15.5)    # Deutsche Börse XETRA Francfort
          lse      = _open(time_dec, 8.0,  16.5)    # London Stock Exchange
          euronext = _open(time_dec, 8.0,  17.5)    # Euronext Paris/Amsterdam/Bruxelles
          bme      = _open(time_dec, 8.0,  17.5)    # Bolsa Madrid
          borsa_it = _open(time_dec, 8.0,  17.5)    # Borsa Italiana Milan
          six      = _open(time_dec, 8.0,  16.5)    # SIX Swiss Exchange Zurich
          omx      = _open(time_dec, 7.0,  15.5)    # OMX Nasdaq Nordic (Helsinki/Stockholm/Copenhagen)
          gpw      = _open(time_dec, 8.0,  16.0)    # Warsaw Stock Exchange GPW

          # 🌎 AMÉRIQUES
          nyse_pre = _open(time_dec, 13.0, 14.5)    # NYSE / NASDAQ pré-marché
          nyse     = _open(time_dec, 14.5, 21.0)    # NYSE + NASDAQ (session principale)
          tsx      = _open(time_dec, 14.5, 21.0)    # Toronto Stock Exchange Canada
          b3       = _open(time_dec, 13.0, 21.0)    # B3 Bolsa São Paulo Brésil
          bmv      = _open(time_dec, 14.5, 21.0)    # Bolsa Mexicana de Valores
          bvc      = _open(time_dec, 14.5, 21.5)    # Bolsa de Valores de Colombia
          bvl      = _open(time_dec, 14.0, 21.0)    # Bolsa de Valores de Lima Pérou
          nyse_post= _open(time_dec, 21.0, 24.0)    # NYSE / NASDAQ après-clôture

          # ── Synthèse ────────────────────────────────────────────────
          markets = {
              # Océanie
              'ASX':       asx,
              # Asie
              'TSE':       tse,
              'KRX':       krx,
              'SSE':       sse,
              'HKEX':      hkex,
              'SGX':       sgx,
              'BSE_NSE':   bse_nse,
              # Moyen-Orient
              'DFM_ADX':   dfm_adx,
              'TADAWUL':   tadawul,
              'TASE':      tase,
              'QSE':       qse,
              'MSM':       msm,
              # Afrique
              'JSE':       jse,
              'EGX':       egx,
              'NGX':       ngx,
              'NSE_KE':    nse_ke,
              'GSE':       gse,
              'BVMAC':     bvmac,
              # Europe
              'XETRA':     xetra,
              'LSE':       lse,
              'EURONEXT':  euronext,
              'BME':       bme,
              'BORSA_IT':  borsa_it,
              'SIX':       six,
              'OMX':       omx,
              'GPW':       gpw,
              # Amériques
              'NYSE_PRE':  nyse_pre,
              'NYSE':      nyse,
              'TSX':       tsx,
              'B3':        b3,
              'BMV':       bmv,
              'BVC':       bvc,
              'BVL':       bvl,
              'NYSE_POST': nyse_post,
          }

          open_mkts = [k for k, v in markets.items() if v]
          is_open   = bool(open_mkts)

          # ── Session (priorité décroissante) ──────────────────────────
          if   nyse:                                      session = 'us_regular'
          elif nyse_pre or b3 or bvl:                     session = 'us_premarket'
          elif nyse_post:                                  session = 'us_postmarket'
          elif euronext or lse or xetra or bme:           session = 'eu_regular'
          elif hkex or sgx or bse_nse or sse:             session = 'asia_regular'
          elif tse or krx:                                session = 'asia_regular'
          elif dfm_adx or tadawul or tase or qse:         session = 'me_regular'
          elif jse or egx or ngx or nse_ke:               session = 'africa_regular'
          elif asx:                                        session = 'oceania_regular'
          else:                                           session = 'closed'

          # ── Écriture outputs GitHub Actions ──────────────────────────
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"is_open={'true' if is_open else 'false'}\n")
              f.write(f"session={session}\n")

          # ── Affichage console ─────────────────────────────────────────
          now_str = now_utc.strftime('%A %d/%m %H:%M')
          print(f"🌍 {now_str} UTC  |  session={session}  |  open={is_open}")
          if open_mkts:
              print(f"   📈 Marchés ouverts ({len(open_mkts)}) : {', '.join(open_mkts)}")
          else:
              print("   🌙 Tous marchés fermés — pas de cycle ce tour")
          EOF

  # ── Job 2 : Boucle de trading ──────────────────────────────
  trading-loop:
    name: 🤖 Boucle de Trading Principale
    runs-on: ubuntu-latest
    needs: market-hours-check
    if: needs.market-hours-check.outputs.is_market_open == 'true' || github.event_name == 'workflow_dispatch'

    permissions:
      contents: write

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel --quiet
          pip install -r requirements.txt \
            --timeout 120 \
            --retries 3 \
            --quiet
          echo "✅ Python $(python --version)"
          echo "✅ pip $(pip --version)"
          echo "✅ Packages installés:"
          pip list | grep -E "numpy|pandas|xgboost|lightgbm|scikit|loguru|pydantic|httpx"

      - name: 🔍 Verify Imports
        run: |
          python3 << 'EOF'
          import sys
          print(f"Python {sys.version}")
          checks = [
              ("numpy",        "np.__version__"),
              ("pandas",       "pd.__version__"),
              ("xgboost",      "xgb.__version__"),
              ("lightgbm",     "lgb.__version__"),
              ("sklearn",      "sklearn.__version__"),
          ]
          failed = False
          import numpy as np
          import pandas as pd
          import xgboost as xgb
          import lightgbm as lgb
          import sklearn
          from loguru import logger
          for pkg, ver_expr in checks:
              try:
                  mod = __import__(pkg)
                  ver = getattr(mod, "__version__", "?")
                  print(f"✅ {pkg} {ver}")
              except ImportError as e:
                  print(f"❌ {pkg}: {e}")
                  failed = True
          print("✅ loguru OK")
          if failed:
              sys.exit(1)
          print("\n🚀 Tous les imports critiques OK !")
          EOF

      # ── Exécution principale ─────────────────────────────────
      - name: 🚀 Run Trading Loop
        env:
          FINANCE_HUB_URL:     ${{ secrets.FINANCE_HUB_URL }}
          AI_PROXY_URL:        ${{ secrets.AI_PROXY_URL }}
          ECONOMIC_DATA_URL:   ${{ secrets.ECONOMIC_DATA_URL }}
          IBKR_HOST:           ${{ secrets.IBKR_HOST }}
          IBKR_PORT:           ${{ secrets.IBKR_PORT }}
          IBKR_CLIENT_ID:      ${{ secrets.IBKR_CLIENT_ID }}
          IBKR_ACCOUNT:        ${{ secrets.IBKR_ACCOUNT }}
          EXECUTION_MODE:      ${{ github.event.inputs.mode || 'signal_only' }}
          DRY_RUN:             ${{ github.event.inputs.dry_run || 'false' }}
          MARKET_SESSION:      ${{ needs.market-hours-check.outputs.market_session }}
          GITHUB_REPOSITORY:   ${{ github.repository }}
          GITHUB_RUN_NUMBER:   ${{ github.run_number }}
          GITHUB_RUN_ID:       ${{ github.run_id }}
          GITHUB_SERVER_URL:   ${{ github.server_url }}
          GH_TOKEN:            ${{ secrets.GITHUB_TOKEN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_API_KEY:    ${{ secrets.FIREBASE_API_KEY }}
          RESEND_ALERT_EMAIL:  ${{ secrets.RESEND_ALERT_EMAIL }}
          GROQ_API_KEY:        ${{ secrets.GROQ_API_KEY }}
          TRADE_AUTO_MODE:     ${{ vars.TRADE_AUTO_MODE || 'enabled' }}
        run: |
          python -m backend.orchestrator.trading_loop
        timeout-minutes: 8

      # ════════════════════════════════════════════════════════
      # Génération debug log JSON depuis les signals
      # ════════════════════════════════════════════════════════
      - name: 🐛 Generate Debug Snapshot
        if: always()
        run: |
          python3 << 'EOF'
          import json, os, datetime
          from pathlib import Path

          signals_dir = Path('signals')
          out_dir     = Path('docs/signals')
          out_dir.mkdir(parents=True, exist_ok=True)

          ts  = datetime.datetime.utcnow().isoformat()
          run = os.environ.get('GITHUB_RUN_NUMBER', '?')
          sid = os.environ.get('GITHUB_RUN_ID', '')
          srv = os.environ.get('GITHUB_SERVER_URL', 'https://github.com')
          rep = os.environ.get('GITHUB_REPOSITORY', '')

          files_data = {}
          for f in signals_dir.glob('*.json'):
              try:
                  with open(f) as fp:
                      files_data[f.name] = json.load(fp)
              except Exception as e:
                  files_data[f.name] = {'error': str(e)}

          debug_path    = out_dir / 'debug_log.json'
          existing_logs = []
          if debug_path.exists():
              try:
                  existing_logs = json.loads(debug_path.read_text()).get('logs', [])
              except Exception:
                  pass

          new_entries = []

          new_entries.append({
              'ts':      ts,
              'level':   'INFO',
              'module':  'trading_loop',
              'symbol':  'GLOBAL',
              'message': f'Cycle #{run} terminé | {len(files_data)} fichiers signals',
              'details': {
                  'run_number': run,
                  'run_url':    f'{srv}/{rep}/actions/runs/{sid}',
                  'files':      list(files_data.keys()),
              },
              'run_id': f'run_{run}'
          })

          signals = files_data.get('current_signals.json', {}).get('signals', {})
          for sym, sig in signals.items():
              new_entries.append({
                  'ts':      ts,
                  'level':   'SIGNAL',
                  'module':  'signal_engine',
                  'symbol':  sym,
                  'message': (
                      f"{sig.get('direction','?').upper()} | "
                      f"score={float(sig.get('final_score', 0)):.3f} | "
                      f"council={sig.get('council','?')}"
                  ),
                  'details': sig,
                  'run_id':  f'run_{run}'
              })

          regime = files_data.get('regime.json', {}).get('global', {})
          if regime:
              new_entries.append({
                  'ts':      ts,
                  'level':   'REGIME',
                  'module':  'regime_model',
                  'symbol':  'GLOBAL',
                  'message': (
                      f"Régime: {regime.get('regime_label','?')} | "
                      f"score={float(regime.get('regime_score', 0)):+.2f} | "
                      f"conf={float(regime.get('confidence', 0)):.1%}"
                  ),
                  'details': regime,
                  'run_id':  f'run_{run}'
              })

          risk = files_data.get('risk_metrics.json', {})
          dd   = risk.get('drawdown', {})
          lv   = risk.get('leverage', {})
          if dd or lv:
              new_entries.append({
                  'ts':      ts,
                  'level':   'RISK',
                  'module':  'risk_manager',
                  'symbol':  'GLOBAL',
                  'message': (
                      f"DD={float(dd.get('current_drawdown', 0))*100:.2f}% | "
                      f"Lever={float(lv.get('current_leverage', 0)):.2f}x | "
                      f"Halt={dd.get('halt_active', False)}"
                  ),
                  'details': risk,
                  'run_id':  f'run_{run}'
              })

          all_logs = (existing_logs + new_entries)[-500:]
          debug_path.write_text(json.dumps({
              'timestamp': ts,
              'run_id':    f'run_{run}',
              'total':     len(all_logs),
              'logs':      all_logs
          }, indent=2, default=str))

          print(
              f"✅ debug_log.json mis à jour | "
              f"{len(new_entries)} nouvelles entrées | {len(all_logs)} total"
          )
          EOF

      # ════════════════════════════════════════════════════════
      # IBKR Status Check — LECTURE SEULE
      # ⚠ Ne surécrit PAS ibkr_status.json
      # Ce fichier est géré exclusivement par ibkr_watcher.py
      # sur Oracle A1 (push_ibkr_status toutes les 30s)
      # ════════════════════════════════════════════════════════
      - name: 🔌 IBKR Status Check (lecture seule)
        if: always()
        run: |
          python3 << 'EOF'
          import json, datetime
          from pathlib import Path

          status_path = Path('docs/signals/ibkr_status.json')
          ts          = datetime.datetime.utcnow().isoformat()

          if status_path.exists():
              try:
                  status    = json.loads(status_path.read_text())
                  connected = status.get('ibkr_connected', False)
                  account   = status.get('account', 'N/A')
                  mode      = status.get('trading_mode', 'N/A')
                  version   = status.get('watcher_version', 'N/A')
                  last_chk  = status.get('last_check', 'N/A')
                  icon      = '✅' if connected else '⚠'
                  print(f"{icon} IBKR Status (watcher Oracle A1):")
                  print(f"   connected      = {connected}")
                  print(f"   account        = {account}")
                  print(f"   trading_mode   = {mode}")
                  print(f"   watcher_version= {version}")
                  print(f"   last_check     = {last_chk}")
              except Exception as e:
                  print(f"⚠ Lecture ibkr_status.json: {e}")
          else:
              print("ℹ ibkr_status.json non présent dans docs/signals/")
              print("  → Le watcher Oracle A1 va le créer au prochain poll (30s)")

          print("")
          print("✅ IBKR Status Check terminé")
          print("   ibkr_status.json NON modifié — géré par ibkr_watcher.py v3.3")
          print(f"   Timestamp vérification : {ts}")
          EOF

      # ════════════════════════════════════════════════════════
      # Copie des signaux vers docs/signals/ (GitHub Pages)
      # ════════════════════════════════════════════════════════
      - name: 📂 Copy signals → docs/signals/ (GitHub Pages)
        if: always()
        run: |
          echo "📂 Création du dossier docs/signals/..."
          mkdir -p docs/signals

          if ls signals/*.json 1> /dev/null 2>&1; then
            echo "📋 Fichiers JSON trouvés dans signals/ :"
            ls -la signals/*.json

            for f in signals/*.json; do
              fname=$(basename "$f")
              if [ "$fname" != "ibkr_status.json" ]; then
                cp "$f" "docs/signals/$fname"
                echo "  ✅ $fname copié"
              else
                echo "  ⏭ $fname ignoré (géré par watcher Oracle)"
              fi
            done

            echo ""
            echo "✅ Signaux copiés dans docs/signals/ :"
            ls -la docs/signals/
          else
            echo "⚠ Aucun JSON dans signals/ — création des fichiers par défaut..."

            echo '{"signals":{},"timestamp":null,"session":"closed","llm_mode":"deterministic","dry_run":false}' \
              > docs/signals/current_signals.json

            echo '{"overall":"initializing","llm_available":false,"workers":{},"mode":"deterministic","session":"closed","dry_run":false}' \
              > docs/signals/system_status.json

            echo '{"global":{"regime_label":"initializing","regime_score":0,"confidence":0,"allow_long":false,"allow_short":false,"reduce_exposure":true,"probabilities":{}},"macro":{},"per_symbol":{}}' \
              > docs/signals/regime.json

            echo '{"total_value":100000,"weights":{},"positions":{},"cash_pct":1.0}' \
              > docs/signals/portfolio.json

            echo '{"drawdown":{"current_drawdown":0,"halt_active":false,"daily_pnl_pct":0},"leverage":{"current_leverage":0,"allowed_leverage":1.5,"is_over_leveraged":false},"var_metrics":{}}' \
              > docs/signals/risk_metrics.json

            echo '{"decisions":{},"executions":[]}' \
              > docs/signals/agent_decisions.json

            echo '{"weights":{"trend":0.40,"mean_reversion":0.25,"vol_carry":0.20,"options_convexity":0.15},"regime":"initializing"}' \
              > docs/signals/strategy_weights.json

            echo '{"portfolio_value":100000,"n_signals":0,"n_executions":0,"llm_mode":"deterministic"}' \
              > docs/signals/performance_metrics.json

            echo "✅ Fichiers par défaut créés dans docs/signals/"
          fi

          touch docs/.nojekyll
          echo "✅ .nojekyll présent"

      # ════════════════════════════════════════════════════════
      # Commit et push docs/signals/ vers GitHub Pages
      # ════════════════════════════════════════════════════════
      - name: 💾 Commit & Push docs/signals/ vers GitHub Pages
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "AlphaVault Bot"
          git config user.email "bot@alphavault-ai.com"

          git pull origin HEAD --rebase --autostash || true

          git add docs/signals/
          git add docs/.nojekyll 2>/dev/null || true

          git reset HEAD docs/signals/ibkr_status.json 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "ℹ Aucun changement dans docs/signals/ — pas de commit nécessaire"
          else
            TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
            git commit -m "📊 Dashboard signals update — ${TIMESTAMP} [run #${{ github.run_number }}]"
            git push origin HEAD
            echo "✅ docs/signals/ mis à jour sur GitHub Pages"
            echo "🌐 Dashboard : https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
          fi

      # ── Upload logs ──────────────────────────────────────────
      - name: 📊 Upload Logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trading-logs-${{ github.run_number }}
          path: |
            signals/
            docs/signals/
            backend/logs/
          retention-days: 7

      - name: 🚨 Notify on Failure
        if: failure()
        run: |
          echo "❌ Trading Loop FAILED — Run #${{ github.run_number }}"
          echo "📋 URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"