# ============================================================
# Auto-deploy du dashboard vers GitHub Pages
# Se déclenche quand docs/ ou signals/ changent
# ============================================================

name: 📊 Deploy Dashboard

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'signals/**'
  workflow_run:
    workflows: ["🤖 Trading Loop — AlphaVault Quant"]
    types: [completed]

permissions:
  contents: read
  pages:    write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url:  ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔧 Copy signals to docs
        run: |
          mkdir -p docs/signals
          cp signals/*.json docs/signals/ 2>/dev/null || true
          echo "✅ Signals copié dans docs/signals/"
          ls -la docs/signals/

      - name: ⚙ Setup Pages
        uses: actions/configure-pages@v4

      - name: 📦 Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs'

      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4