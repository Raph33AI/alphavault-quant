- name: Switch mode on Oracle VM
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.ORACLE_HOST }}
        username: ubuntu
        key: ${{ secrets.ORACLE_SSH_KEY }}
        port: 22
        script_stop: false
        script: |
          set -x
          echo "🔄 Switch vers mode: ${{ github.event.inputs.mode }}"

          # Vérif répertoire
          if [ ! -d /home/ubuntu/alphavault ]; then
            echo "❌ ERREUR: /home/ubuntu/alphavault introuvable"
            exit 1
          fi
          cd /home/ubuntu/alphavault
          echo "✅ CD OK"

          # Vérif fichiers config
          if [ ! -f ibeam/conf/env.paper.list ]; then
            echo "❌ ERREUR: env.paper.list introuvable"
            ls -la ibeam/conf/ || echo "Dossier ibeam/conf absent"
            exit 1
          fi
          echo "✅ Fichiers config OK"

          # Copier la bonne config IBeam
          if [ "${{ github.event.inputs.mode }}" = "live" ]; then
            cp ibeam/conf/env.live.list ibeam/conf/env.list
            sed -i 's/^TRADING_MODE=.*/TRADING_MODE=live/' watcher/.env
            sed -i 's/^IBKR_ACCOUNT=.*/IBKR_ACCOUNT=U21160314/' watcher/.env
            sed -i 's/^IBKR_USERNAME=.*/IBKR_USERNAME=raphnardone/' watcher/.env
            echo "🔴 Config LIVE activée"
          else
            cp ibeam/conf/env.paper.list ibeam/conf/env.list
            sed -i 's/^TRADING_MODE=.*/TRADING_MODE=paper/' watcher/.env
            sed -i 's/^IBKR_ACCOUNT=.*/IBKR_ACCOUNT=DUM895161/' watcher/.env
            sed -i 's/^IBKR_USERNAME=.*/IBKR_USERNAME=vtsdxs036/' watcher/.env
            echo "🟡 Config PAPER activée"
          fi

          # Redémarrer IBeam
          docker compose restart ibeam && echo "✅ IBeam redémarré" || echo "⚠ IBeam restart failed"

          # Redémarrer le watcher
          sudo systemctl restart ibkr-watcher && echo "✅ Watcher redémarré" || echo "⚠ Watcher restart failed"

          sleep 15
          echo "✅ Switch terminé → mode: ${{ github.event.inputs.mode }}"