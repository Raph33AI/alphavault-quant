# ============================================================
# switch-mode.yml — AlphaVault Quant
# Bascule Paper/Live depuis le dashboard frontend
# Déclenché via workflow_dispatch (GitHub API)
# ============================================================

name: 🔄 Switch Trading Mode

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mode de trading'
        required: true
        type: choice
        options:
          - paper
          - live

permissions:
  contents: write

jobs:
  switch:
    name: Switch ${{ inputs.mode }}
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:

      # ── 1. Valider le mode ───────────────────────────────
      - name: Validate mode
        run: |
          if [[ "${{ inputs.mode }}" != "paper" && "${{ inputs.mode }}" != "live" ]]; then
            echo "❌ Mode invalide: ${{ inputs.mode }}"
            exit 1
          fi
          echo "✅ Mode validé: ${{ inputs.mode }}"

      # ── 2. SSH → Oracle VM → Switch ─────────────────────
      - name: SSH into Oracle VM and switch
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:            141.253.96.130
          username:        ubuntu
          key:             ${{ secrets.ORACLE_SSH_KEY }}
          port:            22
          timeout:         60s
          command_timeout: 3m
          script_stop:     false
          request_pty:     true
          script: |
            echo "========================================"
            echo "Switch vers mode: ${{ inputs.mode }}"
            echo "========================================"

            if [ ! -d /home/ubuntu/alphavault ]; then
              echo "ERREUR: /home/ubuntu/alphavault introuvable"
              ls /home/ubuntu/
              exit 1
            fi

            cd /home/ubuntu/alphavault
            echo "Repertoire: $(pwd)"

            echo "Contenu ibeam/conf/:"
            ls -la ibeam/conf/ 2>/dev/null || echo "Dossier ibeam/conf absent"

            echo "watcher/.env actuel:"
            cat watcher/.env 2>/dev/null || echo "watcher/.env absent"

            if [ "${{ inputs.mode }}" = "live" ]; then
              if [ ! -f ibeam/conf/env.live.list ]; then
                echo "ERREUR: env.live.list introuvable"
                exit 1
              fi
              cp ibeam/conf/env.live.list ibeam/conf/env.list
              sed -i 's/^TRADING_MODE=.*/TRADING_MODE=live/'           watcher/.env
              sed -i 's/^IBKR_ACCOUNT=.*/IBKR_ACCOUNT=U21160314/'     watcher/.env
              sed -i 's/^IBKR_USERNAME=.*/IBKR_USERNAME=raphnardone/' watcher/.env
              echo "Config LIVE activee"
            else
              if [ ! -f ibeam/conf/env.paper.list ]; then
                echo "ERREUR: env.paper.list introuvable"
                exit 1
              fi
              cp ibeam/conf/env.paper.list ibeam/conf/env.list
              sed -i 's/^TRADING_MODE=.*/TRADING_MODE=paper/'          watcher/.env
              sed -i 's/^IBKR_ACCOUNT=.*/IBKR_ACCOUNT=DUM895161/'     watcher/.env
              sed -i 's/^IBKR_USERNAME=.*/IBKR_USERNAME=vtsdxs036/'   watcher/.env
              echo "Config PAPER activee"
            fi

            echo "watcher/.env apres switch:"
            cat watcher/.env

            if docker compose restart ibeam 2>&1; then
              echo "IBeam redemarre OK"
            else
              echo "IBeam restart failed - logs:"
              docker logs ibeam --tail 10 2>&1 || true
            fi

            if sudo systemctl restart ibkr-watcher 2>&1; then
              echo "Watcher redemarre OK"
            else
              echo "Watcher restart failed - status:"
              sudo systemctl status ibkr-watcher --no-pager 2>&1 || true
            fi

            sleep 15

            echo "Status final:"
            curl -s http://localhost:5000/current-mode 2>/dev/null || echo "Watcher non disponible sur :5000"

            echo "========================================"
            echo "Switch termine -> mode: ${{ inputs.mode }}"
            echo "========================================"

    # ── 2b. Email notification ───────────────────────────
      - name: Send Switch Notification Email
        if: always()
        env:
          RESEND_API_KEY:    ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
          NEW_MODE:          ${{ inputs.mode }}
          GH_PAGES_BASE:     https://raph33ai.github.io/alphavault-quant/signals
          RUN_URL:           ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python3 << 'PYEOF'
          import json, os, urllib.request, urllib.error, datetime

          BASE    = os.environ.get("GH_PAGES_BASE","")
          API_KEY = os.environ.get("RESEND_API_KEY","")
          FROM    = os.environ.get("RESEND_FROM_EMAIL","")
          MODE    = os.environ.get("NEW_MODE","paper").upper()
          RUN_URL = os.environ.get("RUN_URL","")
          NOW     = datetime.datetime.utcnow().strftime("%Y-%m-%d %H:%M UTC")

          def fetch(path):
              try:
                  req = urllib.request.Request(f"{BASE}/{path}", headers={"Cache-Control":"no-cache"})
                  with urllib.request.urlopen(req, timeout=8) as r:
                      return json.loads(r.read().decode())
              except: return {}

          settings = fetch("notification_settings.json")
          emails   = settings.get("emails", [])
          if not settings.get("notify_switch_paper_live", True) or not emails:
              print("Switch email disabled or no recipients"); exit(0)
          if not API_KEY: print("No RESEND_API_KEY"); exit(0)

          account = "U21160314 (raphnardone)" if MODE=="LIVE" else "DUM895161 (vtsdxs036)"
          color   = "#ef4444" if MODE=="LIVE" else "#3b82f6"
          bg      = "#fef2f2" if MODE=="LIVE" else "#eff6ff"
          border  = "#fecaca" if MODE=="LIVE" else "#bfdbfe"
          warning = "" if MODE=="PAPER" else """
          <div style="background:#fff7ed;border:1px solid #fed7aa;border-radius:8px;padding:12px;margin-bottom:16px;font-size:12px;color:#c2410c">
            <strong>Live Trading Active</strong> — Real capital at risk. Verify IBEAM_KEY and DRY_RUN settings before proceeding.
          </div>"""

          html = f"""<!DOCTYPE html><html><head><meta charset="UTF-8"></head>
          <body style="margin:0;padding:32px 16px;font-family:'Inter',-apple-system,sans-serif;background:#f8fafc">
          <div style="max-width:520px;margin:0 auto;background:white;border-radius:16px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,0.08)">
            <div style="background:{color};padding:28px;text-align:center">
              <div style="font-size:10px;font-weight:800;letter-spacing:2px;color:rgba(255,255,255,0.7);text-transform:uppercase;margin-bottom:8px">AlphaVault Quant</div>
              <div style="font-size:22px;font-weight:900;color:white">Trading Account Switched</div>
              <div style="font-size:12px;color:rgba(255,255,255,0.8);margin-top:4px">{NOW}</div>
            </div>
            <div style="padding:28px">
              {warning}
              <div style="background:{bg};border:1px solid {border};border-radius:10px;padding:20px;text-align:center;margin-bottom:20px">
                <div style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:{color};margin-bottom:6px">New Mode</div>
                <div style="font-size:32px;font-weight:900;color:{color}">{MODE}</div>
                <div style="font-size:13px;color:#64748b;margin-top:6px;font-family:monospace">{account}</div>
              </div>
              <div style="font-size:11px;color:#94a3b8;text-align:center">
                <a href="{RUN_URL}" style="color:{color};text-decoration:none;font-weight:600">View GitHub Actions Run</a>
                &nbsp;·&nbsp;
                <a href="https://raph33ai.github.io/alphavault-quant/" style="color:{color};text-decoration:none;font-weight:600">Open Dashboard</a>
              </div>
            </div>
          </div>
          </body></html>"""

          payload = json.dumps({"from":FROM,"to":emails,
                                "subject":f"[AlphaVault Quant] Account Switched → {MODE} | {NOW}",
                                "html":html}).encode()
          req = urllib.request.Request("https://api.resend.com/emails", data=payload, method="POST",
                                        headers={"Authorization":f"Bearer {API_KEY}","Content-Type":"application/json"})
          try:
              with urllib.request.urlopen(req, timeout=15) as r:
                  d = json.loads(r.read().decode())
                  print(f"Email sent: {d.get('id','ok')} to {len(emails)} recipients")
          except urllib.error.HTTPError as e:
              print(f"Resend {e.code}: {e.read().decode()[:200]}")
          except Exception as e:
              print(f"Error: {e}")
          PYEOF

      # ── 3. Checkout repo ────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 4. Mettre à jour ibkr_status.json ───────────────
      - name: Update ibkr_status.json
        run: |
          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          MODE="${{ inputs.mode }}"

          if [ "$MODE" = "live" ]; then
            ACCOUNT="U21160314"
            PAPER="false"
          else
            ACCOUNT="DUM895161"
            PAPER="true"
          fi

          mkdir -p docs/signals

          jq -n \
            --arg  mode    "$MODE"    \
            --arg  account "$ACCOUNT" \
            --arg  now     "$NOW"     \
            --argjson paper "$PAPER"  \
            '{
              trading_mode:    $mode,
              account:         $account,
              paper_trading:   $paper,
              ibkr_connected:  false,
              orders_executed: 0,
              switch_time:     $now,
              last_check:      $now,
              vm_ip:           "141.253.96.130",
              switched_by:     "dashboard_toggle"
            }' > docs/signals/ibkr_status.json

          echo "ibkr_status.json genere:"
          cat docs/signals/ibkr_status.json

          git config user.name  "AlphaVault Bot"
          git config user.email "bot@alphavault-quant"
          git add docs/signals/ibkr_status.json
          git commit -m "chore: switch to $MODE mode - $NOW" || echo "Nothing to commit"
          git push || echo "Push failed"